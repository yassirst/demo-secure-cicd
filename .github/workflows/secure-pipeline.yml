name: Secure CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least privilege by default — jobs that need more request it explicitly
permissions:
  contents: read

env:
  IMAGE_NAME: demo-secure-app

jobs:

  # 1. Fast feedback: style + unit tests
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 app.py test_app.py --max-line-length=100

      - name: Run unit tests
        run: pytest -v

  # 2. SAST — static analysis of our own source code
  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

  # 3. SCA — are any of our dependencies known-vulnerable?
  dependency-scan:
    name: Dependency Scan (SCA)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit dependencies with pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  # 4. Build the image, then scan IT (source code being clean isn't enough —
  #    the base image and OS packages need checking too)
  build-and-scan-image:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1   # fail the pipeline if a critical/high CVE is found

  # 5. Deploy — only from main, only if every security gate above passed,
  #    and only into an environment that requires approval (see repo Settings > Environments)
  deploy:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    needs: build-and-scan-image
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Deploy application
        run: echo "Deploying ${{ env.IMAGE_NAME }}:${{ github.sha }} to staging..."
        # In a real pipeline this step would, for example:
        #   - docker login using secrets.REGISTRY_USER / secrets.REGISTRY_TOKEN
        #   - docker push to the registry
        #   - trigger the actual deployment (kubectl, ssh, terraform apply...)
        # Secrets are never hardcoded — they're injected from GitHub's encrypted
        # "Secrets" store via the secrets.* context, and only exposed to this job.
